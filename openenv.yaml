name: hallucination-detector
version: "1.0.0"
description: "RL environment for detecting hallucinations in LLM outputs. Agent receives a reference document and an LLM response, and must identify factual errors."
author: "your-hf-username"
tags:
  - hallucination
  - llm-evaluation
  - fact-checking
  - openenv

tasks:
  - id: easy
    description: "Single paragraph, one obvious hallucination. Dates, names, locations swapped."
    difficulty: easy
  - id: medium
    description: "Multi-sentence passages, 1-2 subtle hallucinations mixed with correct facts."
    difficulty: medium
  - id: hard
    description: "Dense factual passages, multiple subtle hallucinations requiring domain knowledge."
    difficulty: hard

action_space:
  type: object
  properties:
    has_hallucination:
      type: boolean
    hallucinated_claim:
      type: string
      nullable: true
    correct_fact:
      type: string
      nullable: true
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0

observation_space:
  type: object
  properties:
    reference_document:
      type: string
    llm_response:
      type: string
    feedback:
      type: string
    score:
      type: number
    done:
      type: boolean

entrypoint: "uvicorn server.app:app --host 0.0.0.0 --port 7860"
